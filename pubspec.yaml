name: maranta_cafe
description: "Maranta Cafe | Cafeteria Movil - Sistema de gestión interna"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Estado ──────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Base de datos local ─────────────────────────────────────────────
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # ── Navegación ──────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Gráficas ────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── HTTP / Google Sheets ────────────────────────────────────────────
  http: ^1.2.1

  # ── Utilidades ──────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.2

  # ── UI ──────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  gap: ^3.0.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
